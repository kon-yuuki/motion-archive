<!doctype html>
<html lang="ja">
  <head>
    <meta name="description" content="Web animation experiments made with vanilla JavaScript and SCSS." />
    <link rel="stylesheet" href="/src/styles/base.scss" />
    <title>Motion Archive</title>
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="../">Motion &amp; UI</a>
      <nav class="site-nav" aria-label="Main">
        <a class="is-current" href="./">Motion Archive</a>
        <a href="../categories/">Categories</a>
        <a href="../easings/">Easings</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <p class="eyebrow">Web animation studies / 2026-</p>
        <h1><span>Motion</span><span>Archive</span></h1>

          小さな実験を一つずつ公開していきます。
        </p>

      <section class="latest">
        <div class="section-heading">
          <h2>Works <sup data-work-count>00</sup></h2>
        </div>
        <div
          class="work-list"
          data-latest-works
          data-work-prefix="../works/"
          data-category-prefix="../categories/"
        ></div>
      </section>
    </main>
    <footer class="site-footer">Motion Archive / Built with Vanilla JS + SCSS</footer>
    <script type="module" src="/src/scripts/home.js"></script>

</html>
