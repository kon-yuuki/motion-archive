<!doctype html>
<html lang="ja">
  <head>
    <meta name="description" content="ホバーで開くツールチップの遅延設計。遅延なし・一律遅延・ホバーインテントの3つを比較するデモ。" />
    <link rel="stylesheet" href="./style.scss" />
    <title>Hover Intent / UI Gallery / Motion &amp; UI</title>
  </head>
  <body>
    <header class="gallery-header">
      <a class="gallery-brand" href="../../">Motion &amp; UI</a>
      <nav class="gallery-nav" aria-label="UI gallery navigation">
        <a href="../">UI Gallery</a>
        <a href="../buttons/">Buttons</a>
        <a class="is-current" href="./">Hover Intent</a>
      </nav>
    </header>

    <main>
      <section class="gallery-hero">
        <p class="eyebrow">UI Gallery / 002</p>
        <h1>Hover Intent</h1>
      </section>

      <section class="gallery-section" aria-labelledby="bad-instant-title">
        <header class="section-heading">
          <div>
            <p class="section-index">01</p>
            <h2 id="bad-instant-title">遅延なし</h2>
          </div>
          <span class="verdict verdict--bad">Bad</span>
        </header>
        <div class="intent-stage intent-stage--bad" data-intent-demo data-open-delay="0" data-group="false">
          <div class="intent-toolbar" role="toolbar" aria-label="操作ツールバー（遅延なし）">
            <button class="intent-target" type="button" data-tip="変更を保存します（⌘S）">保存</button>
            <button class="intent-target" type="button" data-tip="選択中の項目を複製します">複製</button>
            <button class="intent-target" type="button" data-tip="リンクを発行して共有します">共有</button>
            <button class="intent-target" type="button" data-tip="項目名を変更します（F2）">名前変更</button>
            <button class="intent-target" type="button" data-tip="項目をゴミ箱へ移動します">削除</button>
          </div>
        </div>
      </section>

      <section class="gallery-section" aria-labelledby="bad-always-title">
        <header class="section-heading">
          <div>
            <p class="section-index">02</p>
            <h2 id="bad-always-title">一律で遅延</h2>
          </div>
          <span class="verdict verdict--bad">Bad</span>
        </header>
        <div class="intent-stage intent-stage--bad" data-intent-demo data-open-delay="500" data-group="false">
          <div class="intent-toolbar" role="toolbar" aria-label="操作ツールバー（一律遅延）">
            <button class="intent-target" type="button" data-tip="変更を保存します（⌘S）">保存</button>
            <button class="intent-target" type="button" data-tip="選択中の項目を複製します">複製</button>
            <button class="intent-target" type="button" data-tip="リンクを発行して共有します">共有</button>
            <button class="intent-target" type="button" data-tip="項目名を変更します（F2）">名前変更</button>
            <button class="intent-target" type="button" data-tip="項目をゴミ箱へ移動します">削除</button>
          </div>
        </div>
      </section>

      <section class="gallery-section" aria-labelledby="good-title">
        <header class="section-heading">
          <div>
            <p class="section-index">03</p>
            <h2 id="good-title">初回のみ遅延</h2>
          </div>
          <span class="verdict verdict--good">Good</span>
        </header>
        <div
          class="intent-stage intent-stage--good"
          data-intent-demo
          data-open-delay="500"
          data-group="true"
          data-cooldown="600"
        >
          <div class="intent-toolbar" role="toolbar" aria-label="操作ツールバー（ホバーインテント）">
            <button class="intent-target" type="button" data-tip="変更を保存します（⌘S）">保存</button>
            <button class="intent-target" type="button" data-tip="選択中の項目を複製します">複製</button>
            <button class="intent-target" type="button" data-tip="リンクを発行して共有します">共有</button>
            <button class="intent-target" type="button" data-tip="項目名を変更します（F2）">名前変更</button>
            <button class="intent-target" type="button" data-tip="項目をゴミ箱へ移動します">削除</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="gallery-footer">
      <span>Motion &amp; UI / UI Gallery</span>
      <a href="../../works/">Back to works</a>
    </footer>
    <script type="module" src="./script.js"></script>
  </body>
</html>
