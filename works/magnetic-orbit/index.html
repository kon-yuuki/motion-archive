<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetic Orbit / Motion Archive</title>
  </head>
  <body>
    <nav class="experiment-nav" aria-label="Experiment navigation">
      <a class="experiment-nav__brand" href="../../">Motion Archive</a>
      <div class="experiment-nav__links">
        <a class="experiment-nav__link" href="../">All Works</a>
        <button class="detail-toggle" data-details-toggle aria-expanded="false">Info</button>
      </div>
    </nav>
    <main class="experiment-stage orbit-stage" data-stage>
      <div class="orbit-field" data-orbit>
        <div class="orbit-glow"></div>
        <div class="orbit-ring orbit-ring--outer"><span></span></div>
        <div class="orbit-ring orbit-ring--inner"><span></span></div>
        <div class="orbit-core"></div>
      </div>
      <p class="orbit-prompt">Move your pointer</p>
    </main>
    <aside class="experiment-meta" data-details>
      <p class="experiment-meta__index">02 / 03 &middot; 2026.05.25</p>
      <h1>Magnetic Orbit</h1>
      <p class="experiment-meta__description">ポインターを引力に見立て、軌道と光がゆっくり追従するインタラクション。</p>
      <div class="experiment-tags"><span>CSS</span><span>JavaScript</span><span>Hover</span><span>Background</span></div>
      <div class="experiment-actions">
        <button class="replay" data-replay>Reset</button>
        <a href="https://developer.mozilla.org/en-US/docs/Web/Events/pointermove" target="_blank" rel="noreferrer">Reference URL</a>
      </div>
    </aside>
    <script type="module" src="/src/scripts/magnetic-orbit.js"></script>
  </body>
</html>
