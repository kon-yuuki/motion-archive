<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinetic Type / Motion Archive</title>
  </head>
  <body>
    <nav class="experiment-nav" aria-label="Experiment navigation">
      <a class="experiment-nav__brand" href="../../">Motion Archive</a>
      <div class="experiment-nav__links">
        <a class="experiment-nav__link" href="../">All Works</a>
        <button class="detail-toggle" data-details-toggle aria-expanded="false">Info</button>
      </div>
    </nav>
    <main class="experiment-stage kinetic-stage" data-stage>
      <p class="kinetic-caption">Type experiment / CSS animation</p>
      <div class="kinetic-word" aria-label="Motion">
        <span style="--index: 0">M</span><span style="--index: 1">O</span><span style="--index: 2">T</span><span style="--index: 3">I</span><span style="--index: 4">O</span><span style="--index: 5">N</span>
      </div>
      <div class="kinetic-line" aria-hidden="true"></div>
    </main>
    <aside class="experiment-meta" data-details>
      <p class="experiment-meta__index">01 / 03 &middot; 2026.05.25</p>
      <h1>Kinetic Type</h1>
      <p class="experiment-meta__description">静かな余白の中で、文字の輪郭と間隔が順に立ち上がるタイポグラフィ実験。</p>
      <div class="experiment-tags"><span>CSS</span><span>Text</span><span>Loading</span></div>
      <div class="experiment-actions">
        <button class="replay" data-replay>Replay</button>
        <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/Guides/Animations" target="_blank" rel="noreferrer">Reference URL</a>
      </div>
    </aside>
    <script type="module" src="/src/scripts/kinetic-type.js"></script>
  </body>
</html>
