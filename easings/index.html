<!doctype html>
<html lang="ja">
  <head>
    <meta
      name="description"
      content="Motion ArchiveとUI Galleryで使用しているイージングの数値、動き、使用ページを比較する一覧。"
    />
    <link rel="stylesheet" href="./style.scss" />
    <title>Easing Index / Motion &amp; UI</title>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../">Motion &amp; UI</a>
      <nav class="site-nav" aria-label="Main">
        <a href="../works/">All Works</a>
        <a href="../ui-gallery/">UI Gallery</a>
        <a class="is-current" href="./">Easings</a>
      </nav>
    </header>

    <main class="easing-page">
      <header class="easing-hero">
        <p class="eyebrow">Motion tokens / <span data-easing-count>00</span></p>
        <h1>Easing<br />Index</h1>
        <div class="easing-hero__copy">
          <p>カーブにホバーで進行ドット、クリックでボールデモを展開。同じ時間で各イージングの加速・減速を見比べる。</p>
        </div>
      </header>

      <nav class="easing-summary" data-easing-summary aria-label="Easing categories"></nav>
      <div data-easing-catalog></div>
    </main>

    <aside class="easing-global-control" aria-label="All easing duration">
      <button
        class="easing-global-control__toggle"
        type="button"
        aria-expanded="false"
        data-global-duration-toggle
      >
        <span class="easing-global-control__icon" aria-hidden="true">
          <i></i>
          <i></i>
          <i></i>
        </span>
        <span class="easing-global-control__summary">
          <span>All easing</span>
          <output data-global-duration-compact-output>1200ms</output>
        </span>
      </button>
      <div class="easing-global-control__panel">
        <div class="easing-global-control__heading">
          <span>All Duration</span>
          <output data-global-duration-output for="global-duration">1200ms</output>
        </div>
        <input
          id="global-duration"
          type="range"
          min="200"
          max="3000"
          step="100"
          value="1200"
          data-global-duration
          aria-label="Change duration for all easing demos"
        />
        <div class="easing-global-control__footer">
          <span>200ms</span>
          <button type="button" data-global-duration-reset>Reset</button>
          <span>3000ms</span>
        </div>
      </div>
    </aside>

    <footer class="site-footer">Motion &amp; UI / Easing reference</footer>
    <script type="module" src="./script.js"></script>
  </body>
</html>
